<script>
        // Micro-interaction: Particle effect on main button click
        document.querySelector('.bubbly-button').addEventListener('click', function(e) {
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute pointer-events-none rounded-full';
                const size = Math.random() * 10 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.backgroundColor = ['#ff8e8e', '#9aefe3', '#72b8d8'][Math.floor(Math.random() * 3)];
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${vx}px, ${vy}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        });
    </script>
