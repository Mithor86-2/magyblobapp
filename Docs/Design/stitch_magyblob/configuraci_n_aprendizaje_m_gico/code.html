<script>
        // Simple micro-interaction for tactile feedback on card items
        const cards = document.querySelectorAll('.bg-surface-container-low, .bg-surface-container-highest');
        cards.forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'scale(0.98)';
                card.style.boxShadow = 'inset 0 4px 10px rgba(0,0,0,0.05)';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'scale(1)';
                card.style.boxShadow = 'none';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'scale(1)';
                card.style.boxShadow = 'none';
            });
        });
    </script>
