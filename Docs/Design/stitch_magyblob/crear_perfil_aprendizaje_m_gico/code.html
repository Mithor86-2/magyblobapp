<script>
        function selectAvatar(element) {
            // Remove selection from all
            const options = document.querySelectorAll('.avatar-option');
            options.forEach(opt => {
                opt.classList.remove('avatar-selected');
                opt.classList.add('bg-surface-container-low');
            });
            
            // Add selection to clicked
            element.classList.add('avatar-selected');
            element.classList.remove('bg-surface-container-low');

            // Sound effect or haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        }

        // Interest toggle logic
        const interestButtons = document.querySelectorAll('.squishy-button');
        interestButtons.forEach(btn => {
            if(btn.id !== 'save-btn') { // Filter the big save button if needed
                btn.addEventListener('click', function() {
                    this.classList.toggle('bg-secondary-container');
                    this.classList.toggle('bg-surface-container-high');
                    this.classList.toggle('text-on-secondary-container');
                    this.classList.toggle('text-on-surface-variant');
                });
            }
        });
    </script>
