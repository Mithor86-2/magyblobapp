# Dependabot — actualización automática de dependencias (version updates).
#
# Las *alerts* de seguridad (aviso de CVEs) son un toggle aparte en
# Settings → Security → Code security del repo; este fichero solo configura las
# PRs de actualización. Las PRs apuntan a `develop` (Git Flow: main es producción).
#
# Política (aprendida a las malas, ver Docs/lecciones-aprendidas.md): se agrupan
# minor+patch en un PR, y los **majors se IGNORAN** (se revisan y suben a mano). Un
# major suelto rompió el CI (Dependabot subió solo `@prisma/client` a 7 dejando el CLI
# en 6). Además Prisma cliente+CLI+adapter van en un **grupo** para no volver a
# desalinearse. Nota pnpm: el ecosistema `npm` cubre el workspace desde la raíz.
version: 2
updates:
  # --- Dependencias del monorepo (pnpm workspace) ---
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    # Espera 7 días desde la publicación antes de proponer una versión: así los PRs no
    # chocan con la política de supply-chain `minimumReleaseAge` de pnpm (que rechaza
    # paquetes recién publicados) — antes cada grupo minor/patch fallaba el CI por traer
    # versiones de <24 h. Ver Docs/lecciones-aprendidas.md.
    cooldown:
      default-days: 7
    # Los majors se gestionan a MANO (rompen: Prisma 6→7, Expo SDK, Vitest, etc.). El
    # stack de animación nativa (reanimated/worklets/gesture-handler) se ignora del todo:
    # es sensible a crashes en dispositivo (reanimated 4 / New Arch) y se sube a mano con
    # pruebas en dispositivo, nunca por un bump automático del grupo minor/patch.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native-reanimated'
      - dependency-name: 'react-native-worklets'
      - dependency-name: 'react-native-gesture-handler'
    groups:
      # Prisma cliente + CLI + adapter SIEMPRE juntos (deben ir en la misma versión).
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      # Un solo PR semanal con el resto de actualizaciones menores/parche.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # --- GitHub Actions usadas en los workflows (.github/workflows) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    commit-message:
      prefix: ci
      include: scope
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      github-actions:
        update-types:
          - minor
          - patch

  # --- Imagen base del backend (packages/backend/Dockerfile) ---
  - package-ecosystem: docker
    directory: /packages/backend
    schedule:
      interval: weekly
    target-branch: develop
    commit-message:
      prefix: chore
      include: scope
    # El major de la imagen base (p. ej. node 24→26) se sube a mano, no automático.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
