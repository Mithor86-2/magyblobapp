# Dependabot — actualización automática de dependencias (version updates).
#
# Las *alerts* de seguridad (aviso de CVEs) son un toggle aparte en
# Settings → Security → Code security del repo; este fichero solo configura las
# PRs de actualización. Las PRs apuntan a `develop` (Git Flow: main es producción).
#
# Nota pnpm: el ecosistema `npm` cubre el workspace pnpm desde la raíz
# (pnpm-lock.yaml está en `/`). Se agrupan minor+patch para reducir el ruido de PRs.
version: 2
updates:
  # --- Dependencias del monorepo (pnpm workspace) ---
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Un solo PR semanal con todas las actualizaciones menores/parche.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # --- GitHub Actions usadas en los workflows (.github/workflows) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        update-types:
          - minor
          - patch

  # --- Imagen base del backend (packages/backend/Dockerfile) ---
  - package-ecosystem: docker
    directory: /packages/backend
    schedule:
      interval: weekly
    target-branch: develop
    commit-message:
      prefix: chore
      include: scope
