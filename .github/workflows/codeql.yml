# Análisis estático de seguridad con CodeQL (gratis en repos públicos).
#
# Escanea el código JS/TS del monorepo en cada push/PR a main y develop, y una vez
# por semana. Los hallazgos aparecen en la pestaña Security → Code scanning. NO es un
# check requerido por las rulesets (protege-main/develop): se deja informativo para no
# bloquear el merge mientras se ajusta la señal.
name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Semanal: lunes 04:00 UTC.
    - cron: '0 4 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      # JS/TS es lenguaje interpretado: CodeQL no necesita paso de build.
      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Escanea solo el código que se DESPLIEGA. El tooling dev/test (e2e, scripts,
          # tests) y el cliente Prisma generado no son superficie de ataque de producción
          # y generan falsos positivos (p. ej. path-injection en el server estático del
          # E2E, o clear-text-logging en un script de humo manual).
          config: |
            paths-ignore:
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - packages/app/e2e
              - packages/backend/test
              - packages/backend/scripts
              - '**/generated/**'
      - name: Analizar
        uses: github/codeql-action/analyze@v3
