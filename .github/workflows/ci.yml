name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancela ejecuciones anteriores en curso para la misma rama/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate del DoD: typecheck + lint + format:check + tests unitarios. No necesita
  # Docker (las suites que lo requieren se excluyen del `pnpm test`). Además hace
  # cumplir los umbrales de Strategic Coverage por tier (US-35) con `pnpm coverage`:
  # el `pnpm check` local sigue rápido (sin coverage) y el umbral lo fuerza el CI.
  gate:
    name: Gate (typecheck + lint + format + unit + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm coverage
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-report
          path: |
            packages/backend/coverage/
            packages/app/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # Integración de persistencia (Prisma ↔ Postgres real) + E2E del backend por
  # HTTP. Ambas usan Testcontainers; ubuntu-latest trae Docker disponible.
  integration-e2e-backend:
    name: Integración + E2E backend (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # En develop NO se ejecuta (ni build ni merge dependen de E2E; ahorra minutos y
    # evita flakiness). En main sí corre y es obligatoria vía ruleset (protege producción).
    if: ${{ github.ref_name != 'develop' && github.base_ref != 'develop' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @magyblob/backend test:integration
      - run: pnpm --filter @magyblob/backend test:e2e

  # E2E de la app sobre Expo web con Playwright (Chromium) contra el backend real
  # en modo mock. Requiere navegador + Docker (Testcontainers).
  e2e-app:
    name: E2E app (Playwright / Expo web)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # En develop NO se ejecuta (no bloquea build ni merge); en main sí corre.
    if: ${{ github.ref_name != 'develop' && github.base_ref != 'develop' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @magyblob/app exec playwright install --with-deps chromium
      - run: pnpm --filter @magyblob/app test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # Construye la imagen Docker del backend en CADA PR (sin publicarla) para que un
  # fallo del Dockerfile / .dockerignore / `pnpm deploy` se detecte aquí y no en el
  # despliegue de Render. Contexto = raíz del repo, igual que docker-compose/render.
  docker-build:
    name: Build imagen Docker backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (sin push) del backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          load: true
          tags: magyblob-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Smoke de ARRANQUE como Render: levanta la imagen contra un Postgres efímero y
      # corre su CMD real (`prisma migrate deploy && node dist/index.js`), luego verifica
      # `/health`. Cazaría el fallo build-ok/runtime-ko (p. ej. el generador Prisma 7
      # emitiendo imports `.ts` → `node dist` crashea con ERR_MODULE_NOT_FOUND) ANTES de
      # mergear, no en el deploy. Es el hueco que rompió v1.9.0/v1.9.1 (ver
      # Docs/analisis-pruebas-cicd.md).
      - name: Smoke de arranque del backend (migrate + node dist + /health)
        run: |
          docker network create smoke
          docker run -d --name pg --network smoke \
            -e POSTGRES_USER=magyblob -e POSTGRES_PASSWORD=magyblob -e POSTGRES_DB=magyblob \
            postgres:16-alpine
          for i in $(seq 1 30); do docker exec pg pg_isready -U magyblob -q && break; sleep 2; done
          docker run -d --name be --network smoke -p 3000:3000 \
            -e NODE_ENV=production -e PORT=3000 \
            -e DATABASE_URL="postgresql://magyblob:magyblob@pg:5432/magyblob?schema=public" \
            -e JWT_SECRET="ci-smoke-secret-ci-smoke-secret-1234567890" \
            magyblob-backend:ci
          ok=""
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
            echo "intento $i: /health → HTTP $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 3
          done
          if [ -z "$ok" ]; then echo '--- logs del backend ---'; docker logs be; exit 1; fi
          echo "✅ El backend arranca como en Render y /health responde 200."
