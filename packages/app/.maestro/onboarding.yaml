# =============================================================================
# E2E NATIVO (Maestro) — Happy path del MVP (US-38, ADR 0005)
# =============================================================================
#
# Recorre el flujo de la app NATIVA sobre simulador/emulador:
#   bienvenida -> puerta parental -> alta del adulto -> consentimiento ->
#   crear perfil de niño -> generar cuento (modo mock) -> narrarlo (expo-speech)
#   -> actividades (US-09/US-10) -> historial (US-08).
#
# Complementa (no sustituye) al E2E web de Playwright (US-32/US-37/US-39): aquí
# se ejercita lo que SOLO existe en nativo (lectura en voz alta / navegación
# nativa). Localiza por id (testID) y texto accesible ES —coherente con el E2E
# web (onboarding.spec.ts, actividades-historial.spec.ts)—, no por estructura ni
# estilos.
#
# -----------------------------------------------------------------------------
# REQUISITOS (no automatizables aquí; ver Docs/estrategia-pruebas.md)
# -----------------------------------------------------------------------------
#   1. Maestro CLI instalado:
#        curl -fsSL https://get.maestro.mobile.dev | bash
#   2. Un DEVELOPMENT BUILD de Expo instalado en el simulador/emulador (NO Expo
#      Go: la app usa módulos nativos —expo-audio, expo-speech— que Expo Go no
#      incluye). Desde packages/app:
#        npx expo run:ios          # build dev + instala en iOS Simulator
#        npx expo run:android      # build dev + instala en Android Emulator
#   3. Un simulador iOS o emulador Android ARRANCADO.
#   4. El backend levantado en modo mock (AI_PROVIDER=mock), y la app apuntando
#      a él vía EXPO_PUBLIC_API_URL (sin red ni IA externa; cumplimiento menores).
#
# -----------------------------------------------------------------------------
# appId  (placeholder — CONFIRMAR en el dev build)
# -----------------------------------------------------------------------------
#   packages/app/app.json NO declara ios.bundleIdentifier ni android.package, así
#   que Expo los deriva del slug al hacer el development build. Confirma el id real
#   con `xcrun simctl listapps booted` (iOS) o `adb shell pm list packages | grep
#   magyblob` (Android) y ajusta el valor de abajo si no coincide.
# TODO(usuario): confirmar el appId real del development build (ver nota de arriba).
# -----------------------------------------------------------------------------
#
# CÓMO EJECUTAR (con el simulador/emulador arrancado y la app dev instalada):
#   maestro test packages/app/.maestro/onboarding.yaml
#
# =============================================================================

appId: com.magyblob.app # TODO(usuario): confirmar id real del development build de Expo
---
# Arranca con estado limpio para que el onboarding empiece desde la bienvenida
# (si quedara sesión de una corrida previa, se saltaría el alta).
- launchApp:
    clearState: true

# --- Bienvenida -------------------------------------------------------------
- assertVisible: 'Aprendizaje Mágico'
- tapOn: 'Crear cuenta'

# --- Puerta parental (suma aleatoria a + b = ?) -----------------------------
# Punto delicado: el reto es ALEATORIO en cada apertura y la respuesta NO es un
# campo de texto, sino tres CHIPS (la respuesta + dos distractores, barajados)
# que muestran el número como texto (ver components/ParentalGate.tsx). No se
# puede fijar la respuesta en el YAML, así que:
#   1) Copiamos el texto de la pregunta por su testID ("parental-pregunta"),
#      que se pinta como "a + b = ?".
#   2) Con evalScript parseamos los dos operandos y calculamos la suma.
#   3) Tocamos el CHIP cuyo texto visible es esa suma (tapOn por texto calculado).
# Esta es la vía soportada por Maestro (copyTextFrom + evalScript + output);
# es el mismo enfoque que el E2E web (onboarding.spec.ts) traducido a Maestro.
- assertVisible: 'Zona de personas adultas'
- copyTextFrom:
    id: 'parental-pregunta'
# maestro.copiedText vale algo como "7 + 4 = ?". Extraemos los dígitos y sumamos.
# El regex captura los dos primeros números del texto y output.suma queda como
# cadena (p. ej. "11") para poder tocar el chip por su etiqueta.
- evalScript: ${output.ops = maestro.copiedText.match(/\d+/g)}
- evalScript: ${output.suma = String(Number(output.ops[0]) + Number(output.ops[1]))}
# Toca el chip con el resultado. exact-ish: el chip muestra solo el número.
- tapOn: ${output.suma}

# --- Alta del adulto (3 campos: nombre, apellidos, email) -------------------
# Localizados por testID (alta-nombre / alta-apellidos / alta-email), añadidos a
# los TextField de ConsentScreen para un selector estable en nativo.
- tapOn:
    id: 'alta-nombre'
- inputText: 'Ana'
- tapOn:
    id: 'alta-apellidos'
- inputText: 'García'
- tapOn:
    id: 'alta-email'
- inputText: 'ana.app.e2e@example.com'
- hideKeyboard
# Parentesco (chip) + aceptar consentimiento (chip) + continuar.
- tapOn: 'Madre'
- tapOn: 'Acepto'
- tapOn: 'Aceptar y continuar'

# --- Selección de perfil (sin perfiles aún) -> crear el primero -------------
# Nota: el backend persiste el alta. Si re-ejecutas el flow con el MISMO email,
# el alta fallará por "email ya registrado"; cambia el email de arriba o limpia
# la BD del backend (como en el E2E web, que usa email único por test).
- assertVisible: 'Crear nuevo perfil'
- tapOn: 'Crear nuevo perfil'

# --- Crear perfil de niño ---------------------------------------------------
- assertVisible: '¿Cómo te llamas?'
- tapOn: 'Tu nombre' # placeholder del TextField de nombre
- inputText: 'Mateo'
- hideKeyboard
- tapOn: '4' # edad (SelectableChip, texto = número)
- tapOn: 'zorro' # avatar (accessibilityLabel = id del avatar)
- tapOn: 'Animales' # interés (TEMA_LABEL.animales)
- tapOn: '¡Listo!'

# --- Pestaña "Cuentos" -> generar cuento (mock determinista) ----------------
- assertVisible: 'Cuentos'
- tapOn: 'Cuentos'
- assertVisible: 'Generar cuento'
- tapOn: 'Generar cuento'

# El cuento mock es determinista: empieza por "Había una vez" e incluye el
# nombre del niño. Damos margen por si el backend tarda en responder.
- extendedWaitUntil:
    visible: 'Había una vez'
    timeout: 30000
- assertVisible: 'Mateo'

# --- Narración (capacidad SOLO nativa: expo-speech) -------------------------
# Efecto observable que el E2E web no cubre: al tocar "Escuchar", el botón
# principal pasa a "Pausar" (estado playing) y aparece el botón "Parar"
# (accessibilityLabel="Parar"). NarrationControls degrada a voz nativa
# (expo-speech) cuando no hay audio de ElevenLabs.
- assertVisible: 'Escuchar'
- tapOn: 'Escuchar'
- extendedWaitUntil:
    visible: 'Pausar' # el control cambió de estado: la voz está sonando
    timeout: 10000
- assertVisible: 'Parar' # botón de detener (accessibilityLabel="Parar")
- tapOn: 'Parar'
- assertVisible: 'Escuchar' # vuelve a reposo

# --- Actividades (US-09 generar / US-10 marcar realizada) -------------------
# Opcional pero incluido: recorre el otro flujo de la zona infantil. Los textos
# son los mismos que valida el E2E web (actividades-historial.spec.ts).
- tapOn: 'Actividades'
- assertVisible: 'Actividades para hoy'
- tapOn: 'Generar actividades'
- extendedWaitUntil:
    visible: 'Realizado' # ya hay tarjetas de actividad del mock
    timeout: 30000
- tapOn: 'Realizado' # marca la primera actividad
- tapOn: '3 estrellas' # valoración (StarRating, accessibilityLabel="N estrellas")
- assertVisible: '¡Hecha!' # efecto observable: la tarjeta pasa a hecha

# --- Historial (US-08): el cuento generado aparece -------------------------
- tapOn: 'Historial'
- assertVisible: 'Tu historial'
- assertVisible: 'Cuentos mágicos'
# El cuento del mock se titula "{nombre} y la aventura de {tema}"; basta con
# comprobar que el nombre del niño aparece en el historial.
- assertVisible: 'Mateo'
