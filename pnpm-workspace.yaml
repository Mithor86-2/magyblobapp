packages:
  - 'packages/*'

# Fuerza versiones parcheadas de transitivos vulnerables (Dependabot). Todos son deps de
# dev/build/test, sin exposición en producción; el detalle está en
# Docs/planes/deps-vulnerabilidades.md.
overrides:
  'vite@<=6.4.2': '>=6.4.3' # high: server.fs.deny bypass + path traversal + launch-editor
  'esbuild@<0.28.1': '>=0.28.1' # dev server acepta requests / lectura de fichero
  '@hono/node-server@<1.19.13': '>=1.19.13' # bypass serveStatic (tooling Prisma)
  'uuid@<11.1.1': '>=11.1.1' # buffer bounds check v3/v5/v6 (tooling xcode/@expo/config-plugins)

# Dependencias cuyos scripts de instalación se permiten ejecutar (pnpm 11+).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  # Dependencias nativas transitivas de @testcontainers/postgresql para conexión
  # SSH/gRPC a un Docker remoto; con Docker local no se usan, así que no se compilan.
  cpu-features: false
  esbuild: true
  prisma: true
  protobufjs: false
  ssh2: false

minimumReleaseAgeExclude:
  - expo-file-system@56.0.8
  - expo-font@56.0.6
  - expo@56.0.11
