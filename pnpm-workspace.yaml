packages:
  - 'packages/*'

# Dependencias cuyos scripts de instalación se permiten ejecutar (pnpm 11+).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  # Dependencias nativas transitivas de @testcontainers/postgresql para conexión
  # SSH/gRPC a un Docker remoto; con Docker local no se usan, así que no se compilan.
  cpu-features: false
  esbuild: true
  prisma: true
  protobufjs: false
  ssh2: false

minimumReleaseAgeExclude:
  - expo-file-system@56.0.8
  - expo-font@56.0.6
  - expo@56.0.11
