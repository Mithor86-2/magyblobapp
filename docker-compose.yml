services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magyblob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magyblob}
      POSTGRES_DB: ${POSTGRES_DB:-magyblob}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-magyblob}']
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - chromadata:/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollamadata:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-magyblob}:${POSTGRES_PASSWORD:-magyblob}@postgres:5432/${POSTGRES_DB:-magyblob}?schema=public
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
      CHROMA_URL: http://chroma:8000
    ports:
      - '3000:3000'
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  chromadata:
  ollamadata:
